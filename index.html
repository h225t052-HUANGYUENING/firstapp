<style>
body {

<script>
let nums = [];
let score = 0;
let clearCount = 0;
let rolling = true;
let rollIndex = 2;
let rollInterval;
let used = [];
let exprTokens = [];

function rand() {
    return Math.floor(Math.random()*10)+1;
}

function init() {
    nums = [rand(), rand(), 0, 0];
    used = [0,0,0,0];
    exprTokens = [];

    document.getElementById("n1").innerText = nums[0];
    document.getElementById("n2").innerText = nums[1];
    document.getElementById("n3").innerText = "?";
    document.getElementById("n4").innerText = "?";

    document.getElementById("numArea").style.display="none";
    document.getElementById("expr").innerText="";

    rollIndex = 2;
    startRoll();
}

function startRoll() {
    rolling = true;
    rollInterval = setInterval(()=>{
        document.getElementById("n"+(rollIndex+1)).innerText = rand();
    },1);
}

function stopRoll() {
    if(!rolling) return;

    clearInterval(rollInterval);
    nums[rollIndex] = parseInt(document.getElementById("n"+(rollIndex+1)).innerText);

    rollIndex++;

    if(rollIndex <=3){
        startRoll();
    }else{
        rolling = false;
        generateButtons();
    }
}

function generateButtons(){
    let area = document.getElementById("numArea");
    area.innerHTML = "";

    nums.forEach((n,i)=>{
        let btn = document.createElement("button");
        btn.innerText = n;
        btn.onclick = ()=>addNumber(i);
        area.appendChild(btn);
    });

    ["+","-","*","/","(",")"].forEach(op=>{
        let btn = document.createElement("button");
        btn.innerText = op;
        btn.onclick = ()=>addOp(op);
        area.appendChild(btn);
    });

    area.style.display="block";
}

function addNumber(index){
    if(used[index] >= 1) return;

    used[index]++;
    exprTokens.push({type:"num", index:index});
    updateExpr();
}

function addOp(op){
    exprTokens.push({type:"op", value:op});
    updateExpr();
}

function updateExpr(){
    let str="";
    exprTokens.forEach(t=>{
        if(t.type==="num") str+=nums[t.index];
        else str+=t.value;
    });
    document.getElementById("expr").innerText=str;
}

function deleteLast(){
    if(exprTokens.length===0) return;

    let last = exprTokens.pop();
    if(last.type==="num"){
        used[last.index]--;
    }
    updateExpr();
}

function calcMultiplier(){
    let count = {};
    nums.forEach(n=>{
        count[n]=(count[n]||0)+1;
    });
    let maxDup = Math.max(...Object.values(count));
    return maxDup > 1 ? maxDup : 1;
}

function check() {
    let exp = document.getElementById("expr").innerText;

    if(used.filter(x=>x===1).length !== 4){
        document.getElementById("result").innerText="4つ全部使って！";
        document.getElementById("result").className="result wrong";
        return;
    }

    try {
        let val = eval(exp);
        if(Math.abs(val-24)<0.001){

            let multi = calcMultiplier();
            let gain = 10 * multi;
            score += gain;

            document.getElementById("result").innerText=
                "正解！ +" + gain + (multi>1?" (x"+multi+")":"");

            document.getElementById("result").className="result correct";

            if(score >= 100){
                document.getElementById("clearModal").style.display="flex";
            }else{
                nextRound();
            }

        } else {
            document.getElementById("result").innerText="不正解";
            document.getElementById("result").className="result wrong";
        }
    } catch {
        document.getElementById("result").innerText="エラー";
    }
    document.getElementById("score").innerText=score;
}

<body>

<h1>ランダム24点</h1>

<div class="top-bar">
    <button onclick="openRule()">ルール</button>
    <div>Score: <span id="score">0</span></div>
</div>

<div class="cards">
    <div class="card" id="n1"></div>
    <div class="card" id="n2"></div>
    <div class="card" id="n3">?</div>
    <div class="card" id="n4">?</div>
</div>

<button onclick="stopRoll()">STOP</button>

<div class="expression" id="expr"></div>

<div class="buttons" id="numArea" style="display:none;"></div>

<div class="actions">
    <button class="big-btn" onclick="check()">判定</button>

    <div class="score-use">スコア使い</div>

    <div>
        <button onclick="reroll()">再抽選 (-5)</button>
        <button onclick="skip()">Skip (-5)</button>
    </div>
</div>

<div class="result" id="result"></div>

<!-- 规则 -->
<div class="modal" id="ruleModal">
  <div class="modal-content">
    <h3>ルール</h3>
    <p>
    4つの数字を使って24を作る。<br>
    正解で+10点、100点でクリア。<br>
    再抽選：-5点<br>
    Skip：-5点
    </p>
    <button onclick="closeRule()">閉じる</button>
  </div>
</div>

<script>
let nums = [];
let score = 0;
let rolling = true;
let rollInterval;

function rand() {
    return Math.floor(Math.random()*10)+1;
}

function init() {
    nums = [rand(), rand(), rand(), rand()];
    document.getElementById("n1").innerText = nums[0];
    document.getElementById("n2").innerText = nums[1];
    document.getElementById("numArea").style.display="none";
    startRoll();
}

/* 🚀 超高速滚动（几乎不可控） */
function startRoll() {
    rolling = true;
    rollInterval = setInterval(()=>{
        let r1 = rand();
        let r2 = rand();
        let r3 = rand();
        let r4 = rand();

        document.getElementById("n3").innerText = r1;
        document.getElementById("n4").innerText = r2;

        document.getElementById("n3").innerText = r3;
        document.getElementById("n4").innerText = r4;

    }, 1);
}

function stopRoll() {
    if(!rolling) return;
    rolling = false;
    clearInterval(rollInterval);

    nums[2] = parseInt(document.getElementById("n3").innerText);
    nums[3] = parseInt(document.getElementById("n4").innerText);

    generateButtons();
}

/* 根据抽到的数字生成按钮 */
function generateButtons(){
    let area = document.getElementById("numArea");
    area.innerHTML = "";

    nums.forEach(n=>{
        let btn = document.createElement("button");
        btn.innerText = n;
        btn.onclick = ()=>add(n);
        area.appendChild(btn);
    });

    ["+","-","*","/","(",")"].forEach(op=>{
        let btn = document.createElement("button");
        btn.innerText = op;
        btn.onclick = ()=>add(op);
        area.appendChild(btn);
    });

    area.style.display="block";
}

function add(x) {
    document.getElementById("expr").innerText += x;
}

function check() {
    let exp = document.getElementById("expr").innerText;
    try {
        let val = eval(exp);
        if(Math.abs(val-24)<0.001){
            score+=10;
            document.getElementById("result").innerText="正解！";
            document.getElementById("result").className="result correct";
            nextRound();
        } else {
            document.getElementById("result").innerText="不正解";
            document.getElementById("result").className="result wrong";
        }
    } catch {
        document.getElementById("result").innerText="エラー";
    }
    document.getElementById("score").innerText=score;
}

function nextRound(){
    document.getElementById("expr").innerText="";
    init();
    if(score>=100){
        alert("You Win!");
        score=0;
    }
}

function reroll(){
    score-=5;
    nums[2]=rand();
    nums[3]=rand();
    document.getElementById("n3").innerText=nums[2];
    document.getElementById("n4").innerText=nums[3];
    generateButtons();
    document.getElementById("score").innerText=score;
}

function skip(){
    score-=5;
    nextRound();
}

function openRule(){
    document.getElementById("ruleModal").style.display="flex";
}
function closeRule(){
    document.getElementById("ruleModal").style.display="none";
}

init();
</script>

</body>
